services:
  app:
    build: .
    container_name: shopdunk_app
    ports:
      - "8080:80"
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=web
    volumes:
      - .:/var/www/html
    networks:
      - shopdunk_net

  db:
    image: mariadb:10.6
    container_name: shopdunk_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: web
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopdunk_net

  db-init:
    image: mariadb:10.6
    container_name: shopdunk_db_init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./init.sql:/scripts/init.sql
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo '⏳ Waiting for MariaDB...'
        sleep 5
        if ! mysql -h db -uroot -proot web -e "SHOW TABLES LIKE 'product';" 2>/dev/null | grep -q 'product'; then
          echo '📦 Importing database...'
          mysql -h db -uroot -proot web < /scripts/init.sql
          echo '✅ DONE INIT'
        else
          echo '✅ Database already initialized, skipping.'
        fi
    networks:
      - shopdunk_net

volumes:
  db_data:

networks:
  shopdunk_net:
    driver: bridge
